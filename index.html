<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ximena Mayorga — Asesora Financiera</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #E87722;
    --orange-deep: #C85F0A;
    --orange-glow: #FF9940;
    --black: #0D0D0D;
    --dark: #161616;
    --border: rgba(232,119,34,0.25);
    --text-dim: rgba(255,255,255,0.45);
  }
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--black);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    padding: 24px 16px 48px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(232,119,34,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 90% 100%, rgba(232,119,34,0.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .card-wrapper {
    position: relative;
    z-index: 1;
    width: min(440px, 100%);
    animation: cardIn 0.7s cubic-bezier(0.16,1,0.3,1) forwards;
    opacity: 0;
    transform: translateY(28px);
  }

  @keyframes cardIn {
    to { opacity:1; transform:translateY(0); }
  }

  .card {
    background: var(--dark);
    border-radius: 24px;
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.7), 0 0 60px rgba(232,119,34,0.06);
  }

  /* Header */
  .card-header {
    background: #0D0D0D;
    padding: 28px 32px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    position: relative;
  }
  .card-header::after {
    content:'';
    position:absolute;
    bottom:0; left:0; right:0;
    height:4px;
    background: linear-gradient(90deg, var(--orange-deep), var(--orange-glow), var(--orange-deep));
  }
  .logo-img {
    height: 80px;
    width: auto;
    object-fit: contain;
  }
  .company-name {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--orange);
    text-align: center;
  }

  /* Profile */
  .profile {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 32px 8px;
  }
  .avatar-wrap {
    width: 120px; height: 120px;
    border-radius: 50%;
    border: 3px solid var(--orange);
    overflow: hidden;
    box-shadow: 0 0 24px rgba(232,119,34,0.35);
    margin-bottom: 20px;
    flex-shrink: 0;
  }
  .avatar-wrap img {
    width:100%; height:100%;
    object-fit:cover;
    object-position: center top;
  }
  .name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 44px;
    letter-spacing: 2px;
    color: #fff;
    line-height: 1;
    text-align: center;
  }
  .name span { color: var(--orange); }
  .role {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--orange);
    margin-top: 10px;
    text-align: center;
  }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--orange), transparent);
    margin: 24px 32px;
    opacity: 0.35;
  }

  .contact-list {
    padding: 0 32px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .contact-item {
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
    transition: transform 0.2s;
  }
  .contact-item:hover { transform: translateX(4px); }
  .icon-wrap {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: rgba(232,119,34,0.10);
    border: 1px solid rgba(232,119,34,0.22);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, border-color 0.2s;
  }
  .contact-item:hover .icon-wrap {
    background: rgba(232,119,34,0.2);
    border-color: var(--orange);
  }
  .icon-wrap svg { width:19px; height:19px; fill:var(--orange); }
  .contact-text { display:flex; flex-direction:column; gap:2px; }
  .contact-label {
    font-size: 11px; font-weight:600;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-dim);
  }
  .contact-value {
    font-size: 16px; font-weight:400;
    color: #fff; letter-spacing: 0.2px;
  }

  .btn-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 28px 32px 0;
  }
  .btn-full { grid-column: 1 / -1; }
  .btn {
    padding: 15px 10px;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.4px;
    text-align: center;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
    cursor: pointer;
    border: none;
  }
  .btn svg { width:17px; height:17px; fill:currentColor; flex-shrink:0; }
  .btn-primary {
    background: var(--orange);
    color: #fff;
  }
  .btn-primary:hover {
    background: var(--orange-glow);
    box-shadow: 0 0 22px rgba(232,119,34,0.4);
    transform: translateY(-1px);
  }
  .btn-secondary {
    background: transparent;
    color: var(--orange);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover {
    background: rgba(232,119,34,0.08);
    border-color: var(--orange);
    transform: translateY(-1px);
  }
  .btn-green {
    background: #25D366;
    color: #fff;
  }
  .btn-green:hover {
    background: #1ebe5c;
    box-shadow: 0 0 22px rgba(37,211,102,0.35);
    transform: translateY(-1px);
  }

  .card-footer {
    margin-top: 32px;
    padding: 20px 32px 32px;
    border-top: 1px solid rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .footer-dot {
    width:7px; height:7px;
    border-radius:50%;
    background: var(--orange);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.45; transform:scale(0.65); }
  }
  .footer-text {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .footer-text strong { color: var(--orange); }
</style>
</head>
